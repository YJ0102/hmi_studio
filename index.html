<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과제 제출용</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    padding: 20px;
  }
  h1 {
    font-size: 36px;
    margin-bottom: 20px;
  }
  .emoji {
    font-size: 150px;
    line-height: 1;
    margin: 20px 0;
  }
  p {
    font-size: 20px;
    margin-bottom: 20px;
  }
  button {
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid #777;
    background-color: #f0f0f0;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>
<body>

  <h1>Hello, World!</h1>
  
  <div class="emoji">🤔</div>
  
  <p>Hi, there?</p>
  
  <button>I'm doing well, thanks!</button>

</body>
</html>
